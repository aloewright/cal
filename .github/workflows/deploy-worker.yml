name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy cal.fly.pm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HAS_CLOUDFLARE_DEPLOY_CREDS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Deploy Worker
        if: env.HAS_CLOUDFLARE_DEPLOY_CREDS == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Skip Worker deploy
        if: env.HAS_CLOUDFLARE_DEPLOY_CREDS != 'true'
        run: echo "Skipping CI deploy because Cloudflare deployment secrets are not configured."
